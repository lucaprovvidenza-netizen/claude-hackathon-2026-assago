<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Brennero Logistics — Login</title>
    <link rel="stylesheet" href="{{ request.url_for('static', path='css/style.css') }}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h1>Brennero Logistics</h1>
        <h2>Portale Ordini</h2>

        {% if errore %}
            <div class="errore">{{ errore }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary">Accedi</button>
        </form>

        <p class="footer-text">© 2024 Brennero Logistics S.p.A. — v2.0</p>
    </div>
</div>
</body>
</html>
